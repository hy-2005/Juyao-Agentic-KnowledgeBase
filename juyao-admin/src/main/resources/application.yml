# 项目相关配置
juyao:
  # 名称
  name: JuYao
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/juyao/uploadPath，Linux配置 /home/juyao/uploadPath）
  profile: D:/code/juyao-agentic-rag/juyao-admin/src/main/resources/data/upload
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
  # Python RAG FastAPI：仅由后端 RagController HTTP 调用（前端走 Java）；会话由 FastAPI 写 Redis
  rag:
    base-url: http://127.0.0.1:8000
    # 文档异步入库：Java 发 Kafka；默认由本机 @KafkaListener 消费并 HTTP 调 FastAPI 入库（与 sql/rag_document_hash 表 Hash 幂等配合）
    ingest:
      kafka-topic: juyao.rag.documents
      # 是否启用 Java 侧 Kafka 消费并转发 FastAPI（false 时可改由独立 Python 进程消费）
      listener-enabled: true
      # 与 Python 默认 juyao-rag-ingest 相同则切换时 offset 连续；勿与 Python 消费者同时同组抢分区 unless intended
      listener-group-id: juyao-rag-ingest
      listener-concurrency: 3
      # 与 FastAPI rag_ingest_internal_token 一致时可设环境变量 RAG_INGEST_INTERNAL_TOKEN；空表示不校验
      internal-token: ${RAG_INGEST_INTERNAL_TOKEN:}

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.juyao: debug
    org.springframework: warn
    # Kafka：容器启动、分区分配、poll/ack 等（仅 Spring Kafka；底层 client 设 DEBUG 会极吵）
    org.springframework.kafka: info

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 50MB
      # 设置总上传的文件大小
      max-request-size: 60MB
  kafka:
    # 与 docker-compose.kafka.yml 一致：本机连 PLAINTEXT_HOST → 127.0.0.1:9092（compose 内服务名为 kafka）
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.juyao.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.juyao.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,juyao.vip,www.juyao.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
