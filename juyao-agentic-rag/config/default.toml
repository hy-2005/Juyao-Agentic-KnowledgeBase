# juyao-agentic-rag 默认配置（可提交到 Git）
#
# 优先级（高 → 低）：
#   1. 进程环境变量（如 DASHSCOPE_API_KEY）
#   2. 项目根目录 .env
#   3. config/local.toml（本地覆盖，不提交）
#   4. 本文件
#
# 密钥、Token 请放在 .env，不要写进 TOML。

# --- Ollama：Embedding 等本地服务 ---
ollama_base_url = "http://localhost:11434"
chunk_ai_split_enabled = true
embed_model = "mxbai-embed-large:latest"
rerank_model = "bona/bge-reranker-v2-m3:latest"
rerank_provider = "dashscope"  # dashscope | ollama

dashscope_rerank_url = "https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank"
dashscope_rerank_model = "gte-rerank-v2"
dashscope_compatible_base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
gen_model = "qwen3.6-35b-a3b"
dashscope_enable_thinking = false

openai_base_url = "https://api.openai.com/v1"
openai_trust_env = false
chunk_llm_timeout_s = 300.0
chunk_llm_max_retries = 0
kg_extract_timeout_s = 300.0
kg_extract_max_retries = 0

# --- Qdrant ---
qdrant_url = "http://localhost:6333"
qdrant_collection = "juyao_knowledge_chunks"

# --- Elasticsearch ---
elasticsearch_url = "http://localhost:9201"
elasticsearch_index = "juyao_knowledge_chunks"

# --- 切分与检索 ---
chunk_size = 300
chunk_overlap = 60
top_k = 15
rrf_top_n = 8
rerank_top_n = 5
min_relevance_score = 0.35
rrf_k = 60

# --- Query 改写 ---
query_rewrite_enabled = true
query_rewrite_max_subqueries = 4
query_rewrite_timeout_s = 20.0

# --- HyDE ---
hyde_enabled = true
hyde_timeout_s = 20.0

# --- Agentic RAG ---
agentic_rag_max_retrieval_rounds = 0
agentic_rag_planner_max_iterations = 8
agentic_rag_max_consecutive_empty_retrievals = 2
agentic_rag_flow_mode = "routed"  # routed | legacy_planner
vector_then_graph_supplement = true
intent_route_mode = "llm"  # llm | rules
intent_route_timeout_s = 15.0
flowchart_strict_mode = false
rag_sufficiency_mode = "llm"  # llm | heuristic
rag_sufficiency_timeout_s = 25.0

# --- 会话记忆（Redis）---
redis_url = "redis://localhost:6379/0"
chat_max_rounds = 20
chat_history_ttl_seconds = 604800

# --- RAG HTTP 服务 ---
rag_api_host = "0.0.0.0"
rag_api_port = 8000

# --- Neo4j（GraphRAG）---
neo4j_uri = "bolt://localhost:7687"
neo4j_username = "neo4j"
graph_query_enabled = true
graph_expand_max_edges = 40
graph_max_hops = 5
graph_expand_internal_path_cap = 120
graph_question_extract_timeout_s = 30.0
agentic_rag_max_graph_rounds = 0
graph_invoke_policy = "with_each_retrieval"

# --- Kafka ---
kafka_bootstrap_servers = "127.0.0.1:9092"
kafka_topic = "juyao.rag.documents"
kafka_consumer_group = "juyao-rag-ingest"
kafka_auto_offset_reset = "earliest"
